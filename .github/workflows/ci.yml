# Basic CI: lint and build client, verify server installs and imports.
# Runs on push and pull_request to dev and main.
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  client:
    name: Client (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install and lint
        working-directory: client
        run: |
          npm ci
          npm run lint
      - name: Build
        working-directory: client
        run: npm run build

  server:
    name: Server (install + import check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app imports
        working-directory: server
        run: python -c "from app.main import app"
