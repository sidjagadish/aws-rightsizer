# Basic CI: lint and build client, verify server installs and imports.
# Runs on push and pull_request to dev and main.
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  client:
    name: Client (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install and lint
        working-directory: client
        run: |
          npm ci
          npm run lint
      - name: Build
        working-directory: client
        run: npm run build

  server:
    name: Server (poetry install + run check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.in-project true

      - name: Install dependencies (Poetry)
        run: |
          poetry install --no-interaction --no-ansi

      - name: Verify app imports
        run: |
          poetry run python -c "from app.main import app"

      - name: Verify server can start
        run: |
          poetry run python -c "import app.main; print('app loaded')"
          timeout 10s poetry run uvicorn app.main:app --host 127.0.0.1 --port 8000